name: Ghost 24/7

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  actions: write
  contents: write

concurrency:
  group: ghost-bot-single-instance
  cancel-in-progress: true

jobs:
  run-ghost:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir discord.py cryptography>=41.0.0

      - name: Write bot file
        env:
          BOT_CODE: ${{ secrets.BOT_CODE }}
        run: printf '%s\n' "$BOT_CODE" > ghost_bot.py

      - name: Run Ghost
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          [ -z "$DISCORD_TOKEN" ] && { echo "DISCORD_TOKEN missing"; exit 1; }

          python ghost_bot.py &
          BOT_PID=$!

          sleep 15
          if ! kill -0 $BOT_PID 2>/dev/null; then
            echo "Bot failed to start - check logs above"
            exit 1
          fi
          echo "Ghost running (PID $BOT_PID)"

          trap '
            echo "Shutting down Ghost..."
            kill -TERM $BOT_PID 2>/dev/null || true
            sleep 5
            kill -KILL $BOT_PID 2>/dev/null || true
            wait $BOT_PID 2>/dev/null || true
            exit 0
          ' TERM INT

          wait $BOT_PID

      - name: Clean up old runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT=${{ github.run_id }}
          echo "Cleaning up old Ghost runs..."

          run_ids=$(gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/workflows/ghost.yml/runs" \
            --jq '.workflow_runs[] | select(.status == "completed" or .status == "failure" or .status == "cancelled") | .id')

          if [ -z "$run_ids" ]; then
            echo "No runs to clean."
            exit 0
          fi

          for id in $run_ids; do
            [ "$id" = "$CURRENT" ] && continue
            echo "Deleting run $id..."
            gh api \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              "/repos/$REPO/actions/runs/$id" || echo "Failed to delete $id"
            sleep 0.4
          done

          echo "Cleanup done"
