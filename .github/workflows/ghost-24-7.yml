name: Ghost 24/7

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ghost-bot-single-instance
  cancel-in-progress: true

jobs:
  run-ghost:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --no-cache-dir discord.py cryptography

      - name: Write bot file
        env:
          BOT_CODE: ${{ secrets.BOT_CODE }}
        run: printf '%s\n' "$BOT_CODE" > ghost_bot.py

      - name: Clean up old runs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT=${{ github.run_id }}
          # cancel + delete any still-running old instances
          gh run list --repo "$REPO" --workflow "Ghost 24/7" \
            --json databaseId,status \
            --jq '.[] | select(.status != "completed") | .databaseId' \
          | while read ID; do
            [ "$ID" = "$CURRENT" ] && continue
            gh run cancel "$ID" --repo "$REPO" 2>/dev/null || true
            sleep 3
            gh run delete "$ID" --repo "$REPO" 2>/dev/null || true
          done
          # delete all completed runs
          gh run list --repo "$REPO" --workflow "Ghost 24/7" \
            --json databaseId,status \
            --jq '.[] | select(.status == "completed") | .databaseId' \
          | while read ID; do
            [ "$ID" = "$CURRENT" ] && continue
            gh run delete "$ID" --repo "$REPO" 2>/dev/null || true
          done

      - name: Run Ghost
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          [ -z "$DISCORD_TOKEN" ] && { echo "DISCORD_TOKEN missing"; exit 1; }

          python ghost_bot.py &
          BOT_PID=$!

          sleep 12
          kill -0 $BOT_PID 2>/dev/null || { echo "Bot failed to start"; exit 1; }
          echo "Ghost running (PID $BOT_PID)"

          trap '
            kill -TERM $BOT_PID 2>/dev/null || true
            sleep 5
            kill -KILL $BOT_PID 2>/dev/null || true
            wait $BOT_PID 2>/dev/null || true
            exit 0
          ' TERM INT

          wait $BOT_PID

      - name: Save state
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          [ -f conversation_state.json ] || exit 0
          git config --global user.name "ghost-bot"
          git config --global user.email "ghost@bot"
          git add conversation_state.json
          git commit -m "state $(date -u +'%Y-%m-%d %H:%M UTC')" || exit 0
          git push origin HEAD:main || echo "Push failed"
