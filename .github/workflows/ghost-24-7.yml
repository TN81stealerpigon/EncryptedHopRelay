name: Ghost 24/7

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  actions: write
  contents: write

concurrency:
  group: ghost-bot-single-instance
  cancel-in-progress: true

jobs:
  run-ghost:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --no-cache-dir discord.py cryptography

      - name: Run Ghost
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          [ -z "$DISCORD_TOKEN" ] && { echo "DISCORD_TOKEN missing"; exit 1; }
          python ghost_bot.py &
          BOT_PID=$!
          sleep 12
          kill -0 $BOT_PID 2>/dev/null || { echo "Bot failed to start"; exit 1; }
          echo "Ghost running (PID $BOT_PID)"
          trap '
            kill -TERM $BOT_PID 2>/dev/null || true
            sleep 5
            kill -KILL $BOT_PID 2>/dev/null || true
            wait $BOT_PID 2>/dev/null || true
            exit 0
          ' TERM INT
          wait $BOT_PID

      - name: Save state
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "ghost-bot"
          git config --global user.email "ghost@bot"
          git add conversation_state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "state $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:main || echo "Push failed"

      - name: Clean up old runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT=${{ github.run_id }}
          echo "Cleaning up old runs..."
          gh run list --repo "$REPO" --workflow "Ghost 24/7" \
            --json databaseId,status --limit 50 \
            --jq '.[] | select(.status != "completed") | .databaseId' \
          | while read ID; do
            [ "$ID" = "$CURRENT" ] && continue
            echo "Cancelling $ID..."
            gh run cancel "$ID" --repo "$REPO" 2>/dev/null || true
            sleep 5
            gh run delete "$ID" --repo "$REPO" 2>/dev/null || true
          done
          gh run list --repo "$REPO" --workflow "Ghost 24/7" \
            --json databaseId,status --limit 50 \
            --jq '.[] | select(.status == "completed") | .databaseId' \
          | while read ID; do
            [ "$ID" = "$CURRENT" ] && continue
            echo "Deleting $ID..."
            gh run delete "$ID" --repo "$REPO" 2>/dev/null || true
          done
          echo "Cleanup done"
