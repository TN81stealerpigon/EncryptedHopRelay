name: Ghost 24/7

on:
  schedule:
    - cron: "0 */6 * * *"           # Every 6 hours — long runs + auto restart
  workflow_dispatch:                # Allows manual trigger from Actions tab
  push:
    branches: [ main ]

concurrency:
  group: ghost-bot-single-instance
  cancel-in-progress: false         # Queue next run instead of killing current one

jobs:
  run-ghost:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py cryptography

      - name: Write bot code from secret
        env:
          BOT_CODE: ${{ secrets.BOT_CODE }}
        run: |
          python3 -c "import os; open('ghost_bot.py', 'w', encoding='utf-8').write(os.environ['BOT_CODE'])"

      - name: Run Ghost Bot with debug
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          echo "=== Debug: Checking environment variables ==="
          echo "DISCORD_TOKEN length: ${#DISCORD_TOKEN}"
          if [ -z "$DISCORD_TOKEN" ]; then
            echo "ERROR: DISCORD_TOKEN is empty or not set!"
            echo "Check repository secrets → DISCORD_TOKEN must exist and contain a valid token."
            exit 1
          fi
          echo "DISCORD_TOKEN appears to be set (length > 0)"

          echo "Starting bot..."
          python ghost_bot.py &
          BOT_PID=$!

          sleep 10

          if ! kill -0 $BOT_PID 2>/dev/null; then
            echo "Bot failed to start (most likely invalid/missing token or syntax error)"
            echo "Check the lines above for Python errors or token issues."
            exit 1
          fi

          echo "Bot appears to be running (PID $BOT_PID)"

          trap "echo 'Shutting down gracefully...'; kill $BOT_PID 2>/dev/null; wait $BOT_PID 2>/dev/null; echo 'Bot stopped'" EXIT
          wait $BOT_PID || true

      - name: Save and commit conversation state (on exit)
        if: always()  # Runs even if previous step failed/timed out
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}  # Use your GitHub PAT secret for push access
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          if [ -f conversation_state.json ]; then
            git add conversation_state.json
            git commit -m "Update conversation state (auto-save at $(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes to commit"
            git push origin HEAD:main || echo "Push failed (maybe no changes or auth issue)"
          else
            echo "No state file to commit"
          fi
