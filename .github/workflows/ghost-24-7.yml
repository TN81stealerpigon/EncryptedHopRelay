name: Nuke All Workflow Runs

on:
  workflow_dispatch:  # Allows manual triggering

permissions:
  actions: write  # Needed to delete workflow runs

jobs:
  nuke:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all completed workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh api --paginate repos/$REPO/actions/runs --jq '.workflow_runs[] | select(.status == "completed") | .id' |
          xargs -I {} gh run delete {} --repo $REPO -y
